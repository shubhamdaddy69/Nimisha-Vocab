<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vocabulary Mock Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1efe8;
    --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
    --text: #1a1a1a; --text-muted: #5f5e5a; --text-hint: #888780;
    --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-600: #534AB7; --purple-800: #3C3489;
    --teal-50: #E1F5EE; --teal-200: #5DCAA5; --teal-600: #0F6E56; --teal-800: #085041;
    --green-50: #EAF3DE; --green-600: #3B6D11; --green-800: #27500A;
    --red-50: #FCEBEB; --red-200: #F09595; --red-600: #A32D2D; --red-800: #791F1F;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --amber-800: #633806;
    --blue-50: #E6F1FB; --blue-600: #185FA5; --blue-800: #0C447C;
    --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; line-height: 1.6; }
  .app { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 { font-size: 26px; font-weight: 500; margin-bottom: 6px; }
  .header p { font-size: 14px; color: var(--text-muted); }
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  @media(max-width:480px){ .home-grid { grid-template-columns: 1fr; } }
  .type-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-xl); padding: 2rem 1.5rem; cursor: pointer; transition: border-color 0.15s, transform 0.1s; text-align: center; user-select: none; }
  .type-card:hover { border-color: var(--border-md); transform: translateY(-2px); }
  .type-card:active { transform: scale(0.98); }
  .type-card .icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; margin: 0 auto 1rem; }
  .type-card.syn .icon { background: var(--purple-50); color: var(--purple-800); }
  .type-card.ant .icon { background: var(--teal-50); color: var(--teal-800); }
  .type-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .type-card p { font-size: 13px; color: var(--text-muted); }
  .type-card .badge { display: inline-block; margin-top: 12px; font-size: 12px; padding: 3px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border); color: var(--text-muted); }
  .set-selector { display: none; }
  .set-selector h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .set-selector .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .set-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
  .set-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.1s, border-color 0.1s; }
  .set-btn:hover { background: var(--surface2); border-color: var(--border-md); }
  .back-btn { background: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 6px; }
  .back-btn:hover { border-color: var(--border-md); color: var(--text); }
  .quiz-view { display: none; }
  .quiz-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; }
  .quiz-meta { font-size: 13px; color: var(--text-muted); }
  .quiz-meta strong { color: var(--text); }
  .progress-bar { width: 100%; height: 5px; background: var(--surface2); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple-600); border-radius: 99px; transition: width 0.2s; }
  .progress-fill.teal { background: var(--teal-600); }
  .question-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem 1.5rem; margin-bottom: 1.25rem; }
  .q-number { font-size: 12px; color: var(--text-hint); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.5; margin-bottom: 1.5rem; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border); cursor: pointer; font-size: 15px; transition: background 0.1s, border-color 0.1s; background: var(--surface); }
  .option:hover { background: var(--surface2); border-color: var(--border-md); }
  .option.selected { background: var(--purple-50); border-color: var(--purple-200); color: var(--purple-800); }
  .option.selected.teal-mode { background: var(--teal-50); border-color: var(--teal-200); color: var(--teal-800); }
  .option-letter { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; background: var(--surface2); color: var(--text-muted); transition: background 0.1s, color 0.1s; }
  .option.selected .option-letter { background: var(--purple-600); color: #fff; }
  .option.selected.teal-mode .option-letter { background: var(--teal-600); color: #fff; }
  /* Instant feedback styles */
  .option.correct-ans { background: #eaf3de; border-color: #3B6D11; color: #27500A; font-weight: 500; }
  .option.correct-ans .option-letter { background: #3B6D11; color: #fff; }
  .option.wrong-ans { background: #fcebeb; border-color: #A32D2D; color: #791F1F; font-weight: 500; }
  .option.wrong-ans .option-letter { background: #A32D2D; color: #fff; }
  .option.locked { pointer-events: none; opacity: 0.55; }
  .option.locked.correct-ans, .option.locked.wrong-ans { opacity: 1; }
  .quiz-nav { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-top: 0.5rem; }
  .quiz-nav .left, .quiz-nav .right { display: flex; gap: 10px; }
  .nav-btn { padding: 9px 20px; border-radius: var(--radius-md); border: 0.5px solid var(--border); font-size: 14px; font-weight: 500; cursor: pointer; background: var(--surface); transition: background 0.1s, border-color 0.1s; }
  .nav-btn:hover { background: var(--surface2); border-color: var(--border-md); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--purple-600); color: #fff; border-color: var(--purple-600); }
  .nav-btn.primary:hover { background: var(--purple-800); border-color: var(--purple-800); }
  .nav-btn.primary.teal { background: var(--teal-600); border-color: var(--teal-600); }
  .nav-btn.primary.teal:hover { background: var(--teal-800); border-color: var(--teal-800); }
  .nav-btn.save-btn { color: var(--blue-800); border-color: var(--blue-600); }
  .nav-btn.save-btn.saved { background: var(--blue-50); }
  .result-view { display: none; }
  .result-header { margin-bottom: 2rem; }
  .result-header h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .result-header p { font-size: 13px; color: var(--text-muted); }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
  @media(max-width:520px){ .stats-grid { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 12px; text-align: center; }
  .stat-label { font-size: 12px; color: var(--text-hint); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-value { font-size: 26px; font-weight: 500; }
  .stat-card.correct .stat-value { color: var(--green-600); }
  .stat-card.wrong .stat-value { color: var(--red-600); }
  .stat-card.skipped .stat-value { color: var(--amber-600); }
  .score-bar-wrap { margin-bottom: 2rem; }
  .score-bar-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .score-bar { height: 10px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 99px; background: var(--green-600); }
  .result-section-title { font-size: 13px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
  .result-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 8px; }
  .result-item.wrong { border-left: 3px solid var(--red-600); }
  .result-item.skipped { border-left: 3px solid #EF9F27; }
  .result-item.correct { border-left: 3px solid var(--green-600); }
  .result-item .ri-q { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .result-item .ri-row { display: flex; gap: 8px; flex-wrap: wrap; font-size: 13px; margin-top: 4px; }
  .pill { padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; }
  .pill.your { background: var(--red-50); color: var(--red-800); border: 0.5px solid var(--red-200); }
  .pill.ans { background: var(--green-50); color: var(--green-800); border: 0.5px solid #C0DD97; }
  .pill.skip { background: var(--amber-50); color: var(--amber-800); border: 0.5px solid #FAC775; }
  .pill.ok { background: var(--green-50); color: var(--green-800); border: 0.5px solid #C0DD97; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2rem; }
  .dl-btn { padding: 10px 22px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer; background: var(--purple-600); color: #fff; border: none; transition: background 0.1s; }
  .dl-btn:hover { background: var(--purple-800); }
  .dl-btn.outline { background: var(--surface); color: var(--text); border: 0.5px solid var(--border); }
  .dl-btn.outline:hover { background: var(--surface2); }
  .q-palette { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .q-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); color: var(--text-muted); transition: transform 0.1s; }
  .q-dot:hover { transform: scale(1.1); }
  .q-dot.answered { background: var(--purple-50); border-color: var(--purple-600); color: var(--purple-800); }
  .q-dot.answered.teal-mode { background: var(--teal-50); border-color: var(--teal-600); color: var(--teal-800); }
  .q-dot.current { border-width: 2px; border-color: var(--text); color: var(--text); font-weight: 700; }
  .q-dot.dot-correct { background: #eaf3de; border-color: #3B6D11; color: #27500A; }
  .q-dot.dot-wrong { background: #fcebeb; border-color: #A32D2D; color: #791F1F; }
  .saved-indicator { font-size: 12px; color: var(--blue-800); }

</head>
<body>
<div class="app">
  <div class="header">
    <h1>Vocabulary Mock Test</h1>
    <p>Practice synonyms and antonyms — October 2025 batch</p>
  </div>

  <div id="homeView">
    <div class="home-grid">
      <div class="type-card syn" onclick="selectType('synonyms')">
        <div class="icon">SYN</div>
        <h2>Synonyms</h2>
        <p>Words with the same or similar meaning</p>
        <span class="badge" id="synBadge">Loading...</span>
      </div>
      <div class="type-card ant" onclick="selectType('antonyms')">
        <div class="icon">ANT</div>
        <h2>Antonyms</h2>
        <p>Words with opposite meanings</p>
        <span class="badge" id="antBadge">Loading...</span>
      </div>
    </div>
  </div>

  <div class="set-selector" id="setView">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div style="height:1.25rem"></div>
    <h2 id="setViewTitle">Choose a Set</h2>
    <p class="sub" id="setViewSub"></p>
    <div class="set-grid" id="setGrid"></div>
  </div>

  <div class="quiz-view" id="quizView">
    <div class="quiz-top">
      <button class="back-btn" onclick="exitQuiz()">← Sets</button>
      <span class="quiz-meta"><strong id="quizTypeLabel"></strong> — <span id="quizSetLabel"></span></span>
      <span class="saved-indicator" id="savedIndicator" style="display:none">Draft saved</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-palette" id="qPalette"></div>
    <div class="question-card">
      <div class="q-number" id="qNumber"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>
    <div class="quiz-nav">
      <div class="left">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Previous</button>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
      </div>
      <div class="right">
        <button class="nav-btn save-btn" id="saveBtn" onclick="saveDraft()">Save Draft</button>
        <button class="nav-btn primary" id="submitBtn" onclick="confirmSubmit()">Submit</button>
      </div>
    </div>
  </div>

  <div class="result-view" id="resultView">
    <div class="result-header">
      <h2 id="resultTitle">Result</h2>
      <p id="resultSubtitle"></p>
    </div>
    <div class="stats-grid">
      <div class="stat-card total"><div class="stat-label">Total</div><div class="stat-value" id="statTotal"></div></div>
      <div class="stat-card correct"><div class="stat-label">Correct</div><div class="stat-value" id="statCorrect"></div></div>
      <div class="stat-card wrong"><div class="stat-label">Wrong</div><div class="stat-value" id="statWrong"></div></div>
      <div class="stat-card skipped"><div class="stat-label">Skipped</div><div class="stat-value" id="statSkipped"></div></div>
    </div>
    <div class="score-bar-wrap">
      <div class="score-bar-label"><span>Score</span><span id="scorePct"></span></div>
      <div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
    </div>
    <div id="resultItems"></div>
    <div class="result-actions">
      <button class="dl-btn" onclick="downloadResult()">Download Result (.html)</button>
      <button class="dl-btn outline" onclick="downloadResultTxt()">Download Result (.txt)</button>
      <button class="dl-btn outline" onclick="retakeSet()">Retake Set</button>
      <button class="dl-btn outline" onclick="goHome()">Home</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   HOW TO ADD QUESTIONS
   -------------------
   Paste your questions inside the backtick strings below.
   Each set holds 25 questions. Use EXACTLY this format:

   Q1. Your question text here
   A. Option one
   B. Option two
   C. Option three
   D. Option four
   Ans: B

   Rules:
   - Q must start with "Q" followed by a number and a dot
   - Options must be exactly A. B. C. D. (capital letter + dot)
   - Ans: must be exactly "Ans:" followed by A, B, C, or D
   - Leave one blank line between questions
   - Serial numbers in Q don't need to match set order — the
     parser just reads them top to bottom

   To add more sets: copy a RAW_SET block below and fill it in.
================================================================ */

function parseSet(rawText) {
  const questions = [];
  const blocks = rawText.trim().split(/\n{2,}/);
  const letterMap = { A: 0, B: 1, C: 2, D: 3 };
  for (const block of blocks) {
    const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 6) continue;
    const qLine  = lines.find(l => /^Q\d+\./i.test(l));
    const aLine  = lines.find(l => /^A\./i.test(l));
    const bLine  = lines.find(l => /^B\./i.test(l));
    const cLine  = lines.find(l => /^C\./i.test(l));
    const dLine  = lines.find(l => /^D\./i.test(l));
    const ansLine = lines.find(l => /^Ans:/i.test(l));
    if (!qLine || !aLine || !bLine || !cLine || !dLine || !ansLine) continue;
    const q = qLine.replace(/^Q\d+\.\s*/i, '').trim();
    const opts = [
      aLine.replace(/^A\.\s*/i, '').trim(),
      bLine.replace(/^B\.\s*/i, '').trim(),
      cLine.replace(/^C\.\s*/i, '').trim(),
      dLine.replace(/^D\.\s*/i, '').trim()
    ];
    const ansLetter = ansLine.replace(/^Ans:\s*/i, '').trim().toUpperCase();
    const answer = letterMap[ansLetter];
    if (answer === undefined) continue;
    questions.push({ q, options: opts, answer });
  }
  return questions;
}

let currentType = null;

/* ════════ NAVIGATION ════════ */
function show(id) {
  ['homeView','setView','quizView','resultView'].forEach(v =>
    document.getElementById(v).style.display = v === id ? 'block' : 'none'
  );
}
function goHome() { show('homeView'); }

function selectType(type) {
  currentType = type;
  const data = type === 'synonyms' ? SYNONYMS : ANTONYMS;
  document.getElementById('setViewTitle').textContent = type === 'synonyms' ? 'Synonyms — Choose a Set' : 'Antonyms — Choose a Set';
  document.getElementById('setViewSub').textContent = `${data.length} set(s) available`;
  const grid = document.getElementById('setGrid');
  grid.innerHTML = '';
  data.forEach((set, i) => {
    const btn = document.createElement('button');
    btn.className = 'set-btn';
    btn.textContent = `Set ${i + 1}  (${set.length} Qs)`;
    btn.onclick = () => startSet(i);
    grid.appendChild(btn);
  });
  show('setView');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSet(setIndex) {
  currentSet = setIndex;
  const data = currentType === 'synonyms' ? SYNONYMS : ANTONYMS;
  questions = shuffle(data[setIndex]);
  const draftKey = `${currentType}-${setIndex}`;
  answers = savedDrafts[draftKey] ? { ...savedDrafts[draftKey] } : {};
  currentQ = 0;
  document.getElementById('quizTypeLabel').textContent = currentType === 'synonyms' ? 'Synonyms' : 'Antonyms';
  document.getElementById('quizSetLabel').textContent = `Set ${setIndex + 1}`;
  document.getElementById('savedIndicator').style.display = 'none';
  const isTeal = currentType === 'antonyms';
  document.getElementById('progressFill').className = 'progress-fill' + (isTeal ? ' teal' : '');
  document.getElementById('submitBtn').className = 'nav-btn primary' + (isTeal ? ' teal' : '');
  renderQuestion();
  show('quizView');
}

function exitQuiz() { selectType(currentType); }

/* ════════ QUIZ ════════ */
function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const chosen = answers[currentQ];
  const hasAnswer = chosen !== undefined;

  document.getElementById('qNumber').textContent = `Question ${currentQ + 1} of ${total}`;
  document.getElementById('qText').textContent = q.q;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  ['A','B','C','D'].forEach((letter, i) => {
    const div = document.createElement('div');
    let cls = 'option';
    if (hasAnswer) {
      // Always highlight the correct answer in green
      if (i === q.answer) {
        cls += ' correct-ans';
      } else if (i === chosen && chosen !== q.answer) {
        // The wrong choice gets red
        cls += ' wrong-ans';
      } else {
        cls += ' locked';
      }
    }
    div.className = cls;
    div.innerHTML = `<span class="option-letter">${letter}</span><span>${q.options[i]}</span>`;
    if (!hasAnswer) {
      div.onclick = () => { answers[currentQ] = i; renderQuestion(); };
    }
    container.appendChild(div);
  });
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = `${(answered / total) * 100}%`;
  renderPalette();
  document.getElementById('prevBtn').disabled = currentQ === 0;
  document.getElementById('nextBtn').disabled = currentQ === total - 1;
}

function renderPalette() {
  const palette = document.getElementById('qPalette');
  palette.innerHTML = '';
  questions.forEach((q, i) => {
    const dot = document.createElement('div');
    let cls = 'q-dot' + (i === currentQ ? ' current' : '');
    if (answers[i] !== undefined) {
      cls += answers[i] === q.answer ? ' dot-correct' : ' dot-wrong';
    }
    dot.className = cls;
    dot.textContent = i + 1;
    dot.onclick = () => { currentQ = i; renderQuestion(); };
    palette.appendChild(dot);
  });
}

function navigate(dir) {
  currentQ = Math.max(0, Math.min(questions.length - 1, currentQ + dir));
  renderQuestion();
}

function saveDraft() {
  savedDrafts[`${currentType}-${currentSet}`] = { ...answers };
  document.getElementById('savedIndicator').style.display = 'inline';
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ Saved'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save Draft'; btn.classList.remove('saved'); }, 2000);
}

function confirmSubmit() {
  const skipped = questions.length - Object.keys(answers).length;
  if (skipped > 0 && !confirm(`You have ${skipped} unanswered question(s). Submit anyway?`)) return;
  showResult();
}

/* ════════ RESULTS ════════ */
function getResults() {
  let correct = 0, wrong = 0, skipped = 0;
  const results = questions.map((q, i) => {
    if (answers[i] === undefined) { skipped++; return { q, i, status: 'skipped', chosen: null }; }
    if (answers[i] === q.answer)  { correct++; return { q, i, status: 'correct', chosen: answers[i] }; }
    wrong++;                                    return { q, i, status: 'wrong',   chosen: answers[i] };
  });
  return { results, correct, wrong, skipped };
}

function showResult() {
  const total = questions.length;
  const { results, correct, wrong, skipped } = getResults();
  const pct = Math.round((correct / total) * 100);
  const type = currentType === 'synonyms' ? 'Synonyms' : 'Antonyms';
  const date = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });

  document.getElementById('resultTitle').textContent = `${type} — Set ${currentSet + 1} Result`;
  document.getElementById('resultSubtitle').textContent = `Submitted on ${date}`;
  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent   = wrong;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('scorePct').textContent    = `${correct}/${total} (${pct}%)`;
  document.getElementById('scoreFill').style.width   = `${pct}%`;

  const ordered = [
    ...results.filter(r => r.status === 'wrong'),
    ...results.filter(r => r.status === 'skipped'),
    ...results.filter(r => r.status === 'correct')
  ];

  const container = document.getElementById('resultItems');
  container.innerHTML = '';
  const sections = [
    { label: `Wrong Attempts (${wrong})`,     items: ordered.filter(r => r.status === 'wrong'),   cls: 'wrong' },
    { label: `Skipped Questions (${skipped})`, items: ordered.filter(r => r.status === 'skipped'), cls: 'skipped' },
    { label: `Correct Attempts (${correct})`,  items: ordered.filter(r => r.status === 'correct'), cls: 'correct' }
  ];
  sections.forEach(sec => {
    if (!sec.items.length) return;
    const title = document.createElement('div');
    title.className = 'result-section-title';
    title.textContent = sec.label;
    container.appendChild(title);
    sec.items.forEach(r => {
      const div = document.createElement('div');
      div.className = `result-item ${r.status}`;
      const L = ['A','B','C','D'];
      let pillsHtml = '';
      if (r.status === 'wrong') {
        pillsHtml = `<span class="pill your">Your answer: ${L[r.chosen]}) ${r.q.options[r.chosen]}</span>
                     <span class="pill ans">Correct: ${L[r.q.answer]}) ${r.q.options[r.q.answer]}</span>`;
      } else if (r.status === 'skipped') {
        pillsHtml = `<span class="pill skip">Not attempted</span>
                     <span class="pill ans">Correct: ${L[r.q.answer]}) ${r.q.options[r.q.answer]}</span>`;
      } else {
        pillsHtml = `<span class="pill ok">Correct: ${L[r.q.answer]}) ${r.q.options[r.q.answer]}</span>`;
      }
      div.innerHTML = `<div class="ri-q">Q${r.i + 1}. ${r.q.q}</div><div class="ri-row">${pillsHtml}</div>`;
      container.appendChild(div);
    });
  });
  show('resultView');
}

function retakeSet() { startSet(currentSet); }

function buildTxt() {
  const total = questions.length;
  const { results, correct, wrong, skipped } = getResults();
  const pct = Math.round((correct / total) * 100);
  const type = currentType === 'synonyms' ? 'Synonyms' : 'Antonyms';
  const date = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
  const L = ['A','B','C','D'];
  let txt = `VOCABULARY MOCK TEST — RESULT REPORT\n${'='.repeat(50)}\n`;
  txt += `Type    : ${type}\nSet     : Set ${currentSet + 1}\nDate    : ${date}\n${'='.repeat(50)}\n\n`;
  txt += `SUMMARY\n${'-'.repeat(30)}\nTotal     : ${total}\nCorrect   : ${correct}\nWrong     : ${wrong}\nSkipped   : ${skipped}\nScore     : ${correct}/${total} (${pct}%)\n\n`;
  [
    { label: 'WRONG ATTEMPTS',     items: results.filter(r => r.status === 'wrong') },
    { label: 'SKIPPED QUESTIONS',  items: results.filter(r => r.status === 'skipped') },
    { label: 'CORRECT ATTEMPTS',   items: results.filter(r => r.status === 'correct') }
  ].forEach(g => {
    if (!g.items.length) return;
    txt += `${g.label} (${g.items.length})\n${'-'.repeat(40)}\n`;
    g.items.forEach(r => {
      txt += `Q${r.i + 1}. ${r.q.q}\n`;
      if (r.status === 'wrong')    txt += `    Your answer : ${L[r.chosen]}) ${r.q.options[r.chosen]}\n    Correct     : ${L[r.q.answer]}) ${r.q.options[r.q.answer]}\n`;
      else if (r.status === 'skipped') txt += `    Not attempted\n    Correct     : ${L[r.q.answer]}) ${r.q.options[r.q.answer]}\n`;
      else                          txt += `    Correct     : ${L[r.q.answer]}) ${r.q.options[r.q.answer]}\n`;
      txt += '\n';
    });
    txt += '\n';
  });
  txt += `${'='.repeat(50)}\nGenerated by Vocabulary Mock Test\n`;
  return txt;
}
